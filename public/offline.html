<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Diet Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #10b981;
    }
    p {
      color: #888;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .retry-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .retry-btn:hover {
      transform: scale(1.05);
    }
    .features {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #222;
    }
    .features h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #666;
    }
    .feature-list {
      list-style: none;
    }
    .feature-list li {
      padding: 0.5rem 0;
      color: #888;
    }
    .feature-list li:before {
      content: "✓ ";
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Estás Offline</h1>
  <p>No hay conexión a internet. Puedes seguir usando algunas funciones de la app.</p>
  <button class="retry-btn" onclick="window.location.reload()">Reintentar</button>
  
  <div class="features">
    <h2>Disponible offline:</h2>
    <ul class="feature-list">
      <li>Ver comidas registradas</li>
      <li>Ver progreso diario</li>
      <li>Calcular macros</li>
      <li>Ver recetas guardadas</li>
    </ul>
  </div>
</body>
</html>
